[importlinter]
root_package = nlp_policy_nz

[importlinter:contract:guard_boundaries]
name = Guard must not import syntactic, semantic, or storage
type = forbidden
source_modules = nlp_policy_nz.guard
forbidden_modules =
    nlp_policy_nz.syntactic
    nlp_policy_nz.semantic
    nlp_policy_nz.storage

[importlinter:contract:syntactic_boundaries]
name = Syntactic must not import semantic or storage
type = forbidden
source_modules = nlp_policy_nz.syntactic
forbidden_modules =
    nlp_policy_nz.semantic
    nlp_policy_nz.storage

[importlinter:contract:semantic_boundaries]
name = Semantic must not import storage
type = forbidden
source_modules = nlp_policy_nz.semantic
forbidden_modules = nlp_policy_nz.storage
