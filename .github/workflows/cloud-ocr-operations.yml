name: Cloud OCR operations

on:
  workflow_dispatch:
    inputs:
      metadata_manifest:
        description: Repository path to a metadata-only Hathi work-item manifest
        required: true
        default: data/quality/cloud_ocr_pilot_sources.json
        type: string
      run_id:
        description: Stable orchestration run identifier
        required: true
        default: manual-run
        type: string
      pipeline_version:
        description: Pinned OCR pipeline version recorded in the plan
        required: true
        default: 1.0.0
        type: string
      worker_image:
        description: Digest-pinned OCR worker image implementing the metadata plan contract
        required: true
        type: string
      volume_limit:
        description: Maximum number of metadata work items to dispatch
        required: true
        default: "3"
        type: number
      shard_size:
        description: Work identities per resumable shard
        required: true
        default: "100"
        type: number
      max_cost_usd:
        description: Hard cloud budget for this run
        required: true
        default: "25"
        type: number
      publish:
        description: Publish only after review and completeness gates pass
        required: true
        default: false
        type: boolean
      pilot:
        description: Run the fail-closed external pilot gate
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-ocr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - id: validate
        env:
          METADATA_MANIFEST: ${{ inputs.metadata_manifest }}
          RUN_ID: ${{ inputs.run_id }}
          PIPELINE_VERSION: ${{ inputs.pipeline_version }}
          VOLUME_LIMIT: ${{ inputs.volume_limit }}
          SHARD_SIZE: ${{ inputs.shard_size }}
          MAX_COST_USD: ${{ inputs.max_cost_usd }}
        run: |
          set -euo pipefail
          manifest="$METADATA_MANIFEST"
          if [ "${{ inputs.pilot }}" = "true" ]; then
            manifest=.tmp/cloud-ocr/pilot-items.json
            uv run python scripts/prepare_cloud_ocr_pilot_manifest.py \
              --input "$METADATA_MANIFEST" --output "$manifest"
          fi
          uv run --extra dev python scripts/cloud_ocr_orchestrator.py validate \
            --input "$manifest" --run-id "$RUN_ID" \
            --pipeline-version "$PIPELINE_VERSION" --volume-limit "$VOLUME_LIMIT" \
            --shard-size "$SHARD_SIZE" --max-cost-usd "$MAX_COST_USD" \
            --output .tmp/cloud-ocr/plan.json
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py sbom
          --output .tmp/cloud-ocr/sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-plan-${{ github.run_id }}
          path: .tmp/cloud-ocr
          if-no-files-found: error

  plan:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-plan-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py plan
          --input .tmp/cloud-ocr/plan.json --output .tmp/cloud-ocr/dispatch.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-dispatch-${{ github.run_id }}
          path: .tmp/cloud-ocr/dispatch.json

  dispatch:
    needs: plan
    runs-on: ubuntu-latest
    environment: cloud-ocr
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-dispatch-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - name: Dispatch metadata-only work
        env:
          WORKER_IMAGE: ${{ inputs.worker_image }}
        run: |
          test -s .tmp/cloud-ocr/dispatch.json
          echo "$WORKER_IMAGE" | grep -Eq '^.+@sha256:[0-9a-f]{64}$'
          install -d -m 0777 .tmp/cloud-ocr/worker
          docker run --rm \
            -v "$PWD/.tmp/cloud-ocr:/work:rw" \
            "$WORKER_IMAGE" \
            --plan /work/dispatch.json \
            --results /work/worker/worker-results.json \
            --output-dir /work/worker
          cp .tmp/cloud-ocr/worker/worker-results.json .tmp/cloud-ocr/worker-results.json
          test -s .tmp/cloud-ocr/worker-results.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-worker-results-${{ github.run_id }}
          path: .tmp/cloud-ocr/worker-results.json
          if-no-files-found: error

  collect:
    needs: dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-dispatch-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-worker-results-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py collect
          --input .tmp/cloud-ocr/dispatch.json --results .tmp/cloud-ocr/worker-results.json
          --output .tmp/cloud-ocr/collected.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-collected-${{ github.run_id }}
          path: .tmp/cloud-ocr/collected.json

  retry-and-quarantine:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-collected-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py retry
          --input .tmp/cloud-ocr/collected.json --output .tmp/cloud-ocr/reconciled.json
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py quarantine
          --input .tmp/cloud-ocr/reconciled.json --output .tmp/cloud-ocr/quarantine.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-reconciled-${{ github.run_id }}
          path: .tmp/cloud-ocr

  publish:
    needs: retry-and-quarantine
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    environment: cloud-ocr-publish
    env:
      CLOUD_OCR_SIGNING_KEY: ${{ secrets.CLOUD_OCR_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-reconciled-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py publish
          --input .tmp/cloud-ocr/quarantine.json --output .tmp/cloud-ocr/run-report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-run-report-${{ github.run_id }}
          path: .tmp/cloud-ocr/run-report.json

  pilot-gate:
    needs: retry-and-quarantine
    if: ${{ inputs.pilot }}
    runs-on: ubuntu-latest
    environment: cloud-ocr-pilot
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-reconciled-${{ github.run_id }}
          path: .tmp/cloud-ocr
      - run: >-
          uv run python scripts/cloud_ocr_orchestrator.py pilot
          --input .tmp/cloud-ocr/quarantine.json
          --output .tmp/cloud-ocr/pilot-gate.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-ocr-pilot-gate-${{ github.run_id }}
          path: .tmp/cloud-ocr/pilot-gate.json

  hugging-face-staging:
    needs: [publish, pilot-gate]
    if: ${{ inputs.publish && inputs.pilot }}
    runs-on: ubuntu-latest
    environment: hf-archive-publish
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DATASET_ID: ${{ vars.HF_ARCHIVE_DATASET_ID }}
      RUN_ID: ${{ inputs.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-reconciled-${{ github.run_id }}
          path: .tmp/cloud-ocr/reconciled
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-run-report-${{ github.run_id }}
          path: .tmp/cloud-ocr/report
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cloud-ocr-pilot-gate-${{ github.run_id }}
          path: .tmp/cloud-ocr/gate
      - name: Stage metadata-only pilot evidence on Hugging Face
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN"
          test -n "$DATASET_ID"
          install -d .tmp/cloud-ocr/staging
          install -m 0644 .tmp/cloud-ocr/reconciled/quarantine.json .tmp/cloud-ocr/staging/reconciled.json
          install -m 0644 .tmp/cloud-ocr/report/run-report.json .tmp/cloud-ocr/staging/run-report.json
          install -m 0644 .tmp/cloud-ocr/gate/pilot-gate.json .tmp/cloud-ocr/staging/pilot-gate.json
          uv run python scripts/publish_cloud_ocr_evidence.py \
            --folder .tmp/cloud-ocr/staging \
            --dataset-id "$DATASET_ID" \
            --run-id "$RUN_ID"
