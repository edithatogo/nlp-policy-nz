name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
      - name: Install environment
        run: CI=true pixi install
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Build standalone binary
        run: |
          python -m PyInstaller --onefile --name nlp-policy-nz --distpath dist/binaries src/nlp_policy_nz/cli/main.py
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nlp-policy-nz-${{ matrix.os }}
          path: dist/binaries/*
      - name: Publish binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/binaries/*
