name: Docs

on:
  pull_request:
  push:
    branches: [main, master, 'codex/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    name: Astro docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install docs dependencies
        run: npm install --prefix docs-site --no-audit --no-fund

      - name: Install reference generation dependencies
        run: python -m pip install -e ".[dev]"

      - name: Generate API and CLI reference
        run: PYTHONPATH=src python scripts/generate_docs_reference.py

      - name: Check docs
        run: npm run docs:check

      - name: Build docs
        run: npm run docs:build

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/dist

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DEPLOY_GITHUB_PAGES == 'true' }}
        uses: actions/deploy-pages@v5
