name: Benchmark Baseline Update

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-baseline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      - name: Install environment
        run: CI=true pixi install

      - name: Run benchmark harness
        run: |
          mkdir -p .tmp/benchmarks artifacts/baselines
          CI=true pixi run pytest tests/benchmarks -q --benchmark-only --benchmark-disable-gc --benchmark-sort=mean --benchmark-json=.tmp/benchmarks/pytest-benchmark.json

      - name: Update committed benchmark baseline
        run: |
          cp .tmp/benchmarks/pytest-benchmark.json artifacts/baselines/pytest-benchmark.json

      - name: Commit benchmark baseline when changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(benchmarks): Update performance baselines"
          file_pattern: artifacts/baselines/pytest-benchmark.json

      - name: Upload benchmark baseline evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-baseline-update
          path: |
            .tmp/benchmarks/pytest-benchmark.json
            artifacts/baselines/pytest-benchmark.json
          if-no-files-found: error
