name: Publish Zenodo Archive

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
      RELEASE_PARQUET_PATH: output/legislation.parquet
      RELEASE_TITLE: nlp-policy-nz release
      RELEASE_DESCRIPTION: Automated release archive generated from Track 45.
      RELEASE_CREATORS: '[{"name":"Maintainer"}]'
    steps:
      - uses: actions/checkout@v7
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
      - name: Install environment
        run: CI=true pixi install
      - name: Generate release metadata
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          python scripts/release_metadata.py \
            --root . \
            --output-dir .tmp/release \
            --version "$RELEASE_VERSION" \
            --title "$RELEASE_TITLE" \
            --repository-url "https://github.com/${{ github.repository }}" \
            --release-notes "Automated Zenodo archive for tag ${{ github.ref_name }}."
      - name: Build and publish archive
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release.sh \
            --parquet "$RELEASE_PARQUET_PATH" \
            --version "$RELEASE_VERSION" \
            --title "$RELEASE_TITLE" \
            --description "$RELEASE_DESCRIPTION" \
            --creators "$RELEASE_CREATORS"
