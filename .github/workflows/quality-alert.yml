name: Quality Alert

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  quality-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: false
          run-install: false

      - name: Install environment
        run: CI=true pixi install --skip-with-deps semgrep --skip-with-deps scalene

      - name: Evaluate latest quality report
        run: |
          pixi run python -m nlp_policy_nz.cli.main quality alert \
            --history-dir data/quality/runs \
            --threshold 0.75 \
            --create-issue
