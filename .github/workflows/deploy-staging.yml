name: Deploy Staging

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staging:
    runs-on: ubuntu-latest
    env:
      NLP_POLICY_NZ_CORS_ORIGINS: https://staging.example.test
      NLP_POLICY_NZ_RATE_LIMIT_PER_MINUTE: 60
      NLP_POLICY_NZ_UVICORN_WORKERS: 2
    steps:
      - uses: actions/checkout@v7
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
      - name: Install environment
        run: CI=true pixi install
      - name: Run staging smoke tests
        run: pixi run pytest tests/test_server.py -q
      - name: Stage deployment summary
        run: python -c "print('staging deployment gate passed')"
