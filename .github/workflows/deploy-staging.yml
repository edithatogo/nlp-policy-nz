name: Deploy Staging

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staging:
    runs-on: ubuntu-latest
    env:
      NLP_POLICY_NZ_CORS_ORIGINS: https://staging.example.test
      NLP_POLICY_NZ_RATE_LIMIT_PER_MINUTE: 60
      NLP_POLICY_NZ_UVICORN_WORKERS: 2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: false
          run-install: false
      - name: Install environment
        run: CI=true pixi install -e py312 --frozen --skip-with-deps semgrep --skip-with-deps scalene
      - name: Run staging smoke tests
        run: pixi run --frozen -e py312 pytest tests/test_server.py -q
      - name: Stage deployment summary
        run: python -c "print('staging deployment gate passed')"
