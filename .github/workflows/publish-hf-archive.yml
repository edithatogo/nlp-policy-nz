name: Publish structured HathiTrust archive

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: Path to a validated ArchiveBundle JSON artifact
        required: true
        default: artifacts/archive-bundle.json
        type: string
      publish:
        description: Upload to Hugging Face after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    environment: hf-archive-publish
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DATASET_ID: ${{ vars.HF_ARCHIVE_DATASET_ID }}
      COLLECTION_ID: ${{ vars.HF_ARCHIVE_COLLECTION_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: python -m pip install --disable-pip-version-check --no-input "uv==0.8.15"
      - name: Validate and materialize archive
        env:
          BUNDLE: ${{ inputs.bundle }}
        run: |
          test -n "$DATASET_ID"
          test -n "$COLLECTION_ID"
          uv run --extra dev python scripts/plan_hf_archive.py \
            --bundle "$BUNDLE" \
            --output-dir .tmp/hf-archive \
            --dataset-id "$DATASET_ID" \
            --collection-id "$COLLECTION_ID" \
            ${{ inputs.publish && '--publish --verify-endpoint' || '' }}
      - name: Probe public endpoint
        if: ${{ inputs.publish }}
        run: |
          uv run python scripts/probe_hf_archive.py \
            --dataset-id "$DATASET_ID" \
            --output .tmp/hf-archive/endpoint-probe.json
      - name: Upload release evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: hf-archive-release-${{ github.run_id }}
          path: .tmp/hf-archive
          if-no-files-found: error
