name: Benchmarks

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: false
          run-install: false

      - name: Install environment
        run: CI=true pixi install -e default --skip-with-deps semgrep --skip-with-deps scalene --skip-with-deps vllm

      - name: Validate profiling runner CLIs
        run: |
          CI=true pixi run python scripts/profile_pipeline.py --help
          CI=true pixi run python scripts/memray_trace.py --help

      - name: Run benchmark harness
        run: |
          mkdir -p .tmp/benchmarks
          CI=true pixi run pytest tests/benchmarks -q --benchmark-only --benchmark-disable-gc --benchmark-sort=mean --benchmark-json=.tmp/benchmarks/pytest-benchmark.json

      - name: Compare benchmark results against baseline
        run: |
          CI=true pixi run python scripts/compare_benchmarks.py \
            --baseline artifacts/baselines/pytest-benchmark.json \
            --current .tmp/benchmarks/pytest-benchmark.json \
            --thresholds config/benchmark_thresholds.json \
            --default-threshold 0.10 \
            --json-report .tmp/benchmarks/benchmark-regression.json \
            --html-report .tmp/benchmarks/benchmark-regression.html

      - name: Upload benchmark evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-evidence
          path: |
            .tmp/benchmarks/pytest-benchmark.json
            .tmp/benchmarks/benchmark-regression.json
            .tmp/benchmarks/benchmark-regression.html
          if-no-files-found: warn
