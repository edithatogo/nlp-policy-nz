name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_mutation_tests:
        description: Run the optional Track 23 mutation test gate
        required: false
        default: false
        type: boolean

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        include:
          - python-version: "3.11"
            pixi-environment: py311
          - python-version: "3.12"
            pixi-environment: py312
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: false
          run-install: false

      - name: Configure matrix environment
        run: |
          echo "CI_PLATFORM=${{ matrix.os }}" >> "$GITHUB_ENV"
          echo "PYTHON_VERSION=${{ matrix.python-version }}" >> "$GITHUB_ENV"
          echo "PIXI_ENVIRONMENT=${{ matrix.pixi-environment }}" >> "$GITHUB_ENV"

      - name: Hadolint Dockerfile
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008

      - name: Install environment
        run: CI=true pixi install -e "$PIXI_ENVIRONMENT" --skip-with-deps semgrep --skip-with-deps scalene --skip-with-deps vllm

      - name: Supply-chain dependency audit
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pixi run --as-is -e "$PIXI_ENVIRONMENT" python scripts/check_dependency_security.py

      - name: Static application security testing
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m pip install --user semgrep==1.168.0
          pixi run --as-is -e "$PIXI_ENVIRONMENT" bandit -c .bandit -r src/nlp_policy_nz/ -lll -iii
          semgrep scan --config p/python --severity WARNING --error --metrics=off src/nlp_policy_nz/

      - name: Generate CycloneDX SBOM
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pixi run --as-is -e "$PIXI_ENVIRONMENT" python -c "import sys; from pathlib import Path; sys.path.insert(0, 'src'); from nlp_policy_nz.security import generate_cyclonedx_sbom; generate_cyclonedx_sbom(Path('.tmp/sbom/nlp-policy-nz.cdx.json'))"

      - name: Commit message lint
        if: ${{ github.event_name == 'pull_request' }}
        run: pixi run --as-is -e "$PIXI_ENVIRONMENT" python scripts/check_commit_message.py

      - name: Track 23 CI/config validation
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -- tests/smoke tests/test_quality_infrastructure.py tests/test_track23_evidence.py -q

      - name: Smoke tests (fast)
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -x tests/test_smoke.py

      - name: Track 20 adaptive training runtime
        if: matrix.os == 'ubuntu-latest'
        run: |
          CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" track20-runtime
          CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" track20-smoke
          CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -- tests/test_track20_runtime.py tests/test_track20_evidence.py -q

      - name: Track 71 Mojo Linux CI sandbox
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          set -euo pipefail
          CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -- tests/test_track71_mojo_sandbox.py -q
          sandbox_dir="$GITHUB_WORKSPACE/.tmp/mojo-sandbox"
          rm -rf "$sandbox_dir"
          mkdir -p "$sandbox_dir"
          cp experiments/mojo/kernel.mojo "$sandbox_dir/kernel.mojo"
          cd "$sandbox_dir"
          pixi init mojo-sandbox -c https://conda.modular.com/max/ -c conda-forge
          pixi add mojo
          pixi run mojo --version
          pixi run mojo kernel.mojo > mojo-output.json
          PYTHONPATH="$GITHUB_WORKSPACE" python - <<'PY'
          import json
          from pathlib import Path

          from experiments.mojo.sandbox import render_reference_json

          expected = json.loads(render_reference_json())
          actual = json.loads(Path("mojo-output.json").read_text(encoding="utf-8"))
          if actual != expected:
              raise SystemExit(f"Mojo output mismatch: {actual!r} != {expected!r}")
          PY

      - name: Validate AKN v3 examples
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -- tests/test_akn_v3.py -q

      - name: Track 76 source inventory validation
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" test -- tests/test_source_inventory.py -q

      - name: Conductor mirror check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" python scripts/check_conductor_mirror.py

      - name: Targeted lint
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" lint-ci

      - name: Targeted format check
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" format-ci

      - name: Targeted basedpyright type check
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" typecheck-ci

      - name: Test with coverage
        run: CI=true pixi run --as-is -e "$PIXI_ENVIRONMENT" coverage-ci

      - name: Upload SBOM artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: nlp-policy-nz-sbom-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .tmp/sbom/nlp-policy-nz.cdx.json

      - name: Record matrix status
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          CI_PLATFORM: ${{ matrix.os }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          mkdir -p .tmp/ci-status
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "os": os.environ["CI_PLATFORM"],
              "python": os.environ["PYTHON_VERSION"],
              "status": os.environ["JOB_STATUS"],
          }
          Path(".tmp/ci-status/status.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload matrix status artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-status-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .tmp/ci-status/status.json

      - name: Optional mutation tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mutation_tests }}
        run: CI=true pixi run mutation

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  ci-report:
    if: always()
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download matrix statuses
        uses: actions/download-artifact@v8
        with:
          path: .tmp/ci-statuses
      - name: Render matrix summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          rows = ["| OS | Python | Status |", "|---|---|---|"]
          for status_file in sorted(Path(".tmp/ci-statuses").rglob("status.json")):
              data = json.loads(status_file.read_text(encoding="utf-8"))
              rows.append(f"| {data['os']} | {data['python']} | {data['status']} |")
          summary = Path(".tmp/ci-statuses/summary.md")
          summary.write_text("\n".join(rows) + "\n", encoding="utf-8")
          print(summary.read_text(encoding="utf-8"))
          PY
