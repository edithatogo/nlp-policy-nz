name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' }}

      - name: Install environment
        run: CI=true pixi install

      - name: Smoke tests (fast)
        run: CI=true pixi run test -x tests/test_smoke.py

      - name: Lint
        run: CI=true pixi run lint

      - name: Format check
        run: CI=true pixi run format

      - name: Type check
        run: CI=true pip install pyright && pyright src

      - name: Complexity check
        run: CI=true pixi run check-complexity

      - name: Boundary check
        run: CI=true pixi run check-boundaries

      - name: Test with coverage
        run: CI=true pip install pytest-cov && pixi run test -- --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Full check
        run: CI=true pixi run check
