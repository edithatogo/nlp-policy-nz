name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_mutation_tests:
        description: Run the optional Track 23 mutation test gate
        required: false
        default: false
        type: boolean

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' }}

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Install environment
        run: CI=true pixi install

      - name: Supply-chain dependency audit
        run: pixi run python scripts/check_dependency_security.py

      - name: Static application security testing
        run: |
          pixi run bandit -c .bandit -r src/nlp_policy_nz/ -lll -iii
          pixi run semgrep scan --config p/python --severity WARNING --error --metrics=off src/nlp_policy_nz/

      - name: Generate CycloneDX SBOM
        run: pixi run python -c "import sys; from pathlib import Path; sys.path.insert(0, 'src'); from nlp_policy_nz.security import generate_cyclonedx_sbom; generate_cyclonedx_sbom(Path('.tmp/sbom/nlp-policy-nz.cdx.json'))"

      - name: Commit message lint
        if: ${{ github.event_name == 'pull_request' }}
        run: pixi run python scripts/check_commit_message.py

      - name: Track 23 CI/config validation
        run: CI=true pixi run test -- tests/smoke tests/test_quality_infrastructure.py tests/test_track23_evidence.py -q

      - name: Smoke tests (fast)
        run: CI=true pixi run test -x tests/test_smoke.py

      - name: Track 20 adaptive training runtime
        run: |
          CI=true pixi run track20-runtime
          CI=true pixi run track20-smoke
          CI=true pixi run test -- tests/test_track20_runtime.py tests/test_track20_evidence.py -q

      - name: Validate AKN v3 examples
        run: CI=true pixi run test -- tests/test_akn_v3.py -q

      - name: Targeted lint
        run: CI=true pixi run lint-ci

      - name: Targeted format check
        run: CI=true pixi run format-ci

      - name: Targeted basedpyright type check
        run: CI=true pixi run typecheck-ci

      - name: Test with coverage
        run: CI=true pip install pytest-cov && pixi run coverage-ci

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: nlp-policy-nz-sbom
          path: .tmp/sbom/nlp-policy-nz.cdx.json

      - name: Optional mutation tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mutation_tests }}
        run: CI=true pixi run mutation

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
