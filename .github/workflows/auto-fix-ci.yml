name: Auto Fix CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: false
          run-install: false

      - name: Install environment
        run: CI=true pixi install -e py312 --frozen --skip-with-deps semgrep --skip-with-deps scalene

      - name: Attempt automatic fixes
        id: autofix
        continue-on-error: true
        run: pixi run --frozen -e py312 python scripts/ci_auto_fix.py --report .tmp/auto-fix-report.json

      - name: Commit fixes
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No fixes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): apply automated lint and type fixes"
          git push

