name: Publish Hugging Face Datasets

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    # Publication is an external release action and stays disabled until the
    # repository has approved targets, credentials, and a generated payload.
    if: ${{ vars.HF_PUBLICATION_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO_ID: ${{ secrets.HF_DATASET_REPO_ID }}
      RELEASE_PARQUET_PATH: output/legislation.parquet
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Validate publication configuration
        run: |
          test -n "$HF_TOKEN" || { echo "HF_TOKEN secret is required" >&2; exit 1; }
          test -n "$HF_DATASET_REPO_ID" || { echo "HF_DATASET_REPO_ID secret is required" >&2; exit 1; }
          [[ "$HF_DATASET_REPO_ID" == */* ]] || { echo "HF_DATASET_REPO_ID must be owner/name" >&2; exit 1; }
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
      - name: Install environment
        run: CI=true pixi install
      - name: Generate release metadata
        run: |
          PYTHONPATH=src pixi run python scripts/release_metadata.py \
            --root . \
            --output-dir .tmp/release \
            --title "nlp-policy-nz" \
            --repository-url "https://github.com/${{ github.repository }}" \
            --dataset-revision "${{ github.run_number }}" \
            --release-notes "Automated dataset publish from master."
      - name: Upload dataset
        run: |
          PYTHONPATH=src pixi run python -m nlp_policy_nz.cli.main upload-dataset \
            --parquet "$RELEASE_PARQUET_PATH" \
            --repo-id "$HF_DATASET_REPO_ID" \
            --token "$HF_TOKEN"
