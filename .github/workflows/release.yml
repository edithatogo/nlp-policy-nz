name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      - name: Install environment
        run: CI=true pixi install

      - name: Generate release notes
        id: release_notes
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          version: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          dry-run: true

      - name: Smoke test package
        run: CI=true pixi run test -x tests/test_smoke.py

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate CycloneDX SBOM
        run: pixi run python -c "import sys; from pathlib import Path; sys.path.insert(0, 'src'); from nlp_policy_nz.security import generate_cyclonedx_sbom; generate_cyclonedx_sbom(Path('.tmp/sbom/nlp-policy-nz.cdx.json'))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: nlp-policy-nz ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            dist/*
            .tmp/sbom/nlp-policy-nz.cdx.json
