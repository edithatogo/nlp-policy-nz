name: Publish Hugging Face Space

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO_ID: ${{ secrets.HF_SPACE_REPO_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true
      - name: Install environment
        run: CI=true pixi install
      - name: Deploy Space
        run: |
          pixi run nlp-policy-nz deploy-space \
            --repo-id "$HF_SPACE_REPO_ID" \
            --token "$HF_TOKEN"
