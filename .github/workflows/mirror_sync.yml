name: Mirror Sync

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - name: Mirror to secondary Git remotes
        env:
          GITLAB_MIRROR_URL: ${{ secrets.GITLAB_MIRROR_URL }}
          CODEBERG_MIRROR_URL: ${{ secrets.CODEBERG_MIRROR_URL }}
          GIT_MIRROR_SSH_PRIVATE_KEY: ${{ secrets.GIT_MIRROR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GITLAB_MIRROR_URL" ] && [ -z "$CODEBERG_MIRROR_URL" ]; then
            echo "No mirror URLs configured; skipping mirror sync."
            exit 0
          fi

          if [ -z "$GIT_MIRROR_SSH_PRIVATE_KEY" ]; then
            echo "Mirror SSH key is not set; skipping mirror sync."
            exit 0
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$GIT_MIRROR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          mirror_to_remote() {
            local remote_name="$1"
            local mirror_url="$2"

            if [ -z "$mirror_url" ]; then
              echo "$remote_name mirror URL is not set; skipping."
              return 0
            fi

            local host
            host="$(printf '%s\n' "$mirror_url" | cut -d'@' -f2 | cut -d':' -f1)"
            if [ -z "$host" ]; then
              echo "$remote_name mirror URL has no SSH host; skipping."
              return 0
            fi

            ssh-keyscan -t ed25519 "$host" >> ~/.ssh/known_hosts
            git remote add "$remote_name" "$mirror_url"
            git push --force --prune "$remote_name" HEAD:${{ github.ref }}
          }

          mirror_to_remote gitlab "$GITLAB_MIRROR_URL"
          mirror_to_remote codeberg "$CODEBERG_MIRROR_URL"
