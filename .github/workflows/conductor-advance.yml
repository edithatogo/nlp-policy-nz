name: Conductor Advancement

on:
  workflow_dispatch:
    inputs:
      track_id:
        description: Track ID to advance
        required: true
        type: string
  schedule:
    - cron: "20 * * * *"

jobs:
  advance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      - name: Install environment
        run: CI=true pixi install

      - name: Advance completed track
        run: pixi run python scripts/conductor_advance_agent.py --track-id "${{ inputs.track_id || 'track43_agentic_automation_20260626' }}" --json

