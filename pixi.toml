[project]
name = "nlp-policy-nz"
version = "0.1.0"
description = "SOTA shared core NLP pipeline for New Zealand legislation and Hansard corpora"
authors = ["Maintainer"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.14"
pip = "*"
rust = ">=1.80"
vale = ">=3.0"
nodejs = ">=20"
git = "*"

[pypi-dependencies]
polars = ">=1.0.0"
pyarrow = ">=16.0.0"
spacy = ">=3.7.0"
transformers = ">=4.40.0"
torch = ">=2.2.0"
bitsandbytes = ">=0.42.0"
msgspec = ">=0.18.0"
narwhals = ">=1.0.0"
lancedb = ">=0.6.0"
networkx = ">=3.0"
faiss-cpu = ">=1.8.0"
ruff = ">=0.3.0"
tach = ">=0.5.0"
import-linter = ">=2.0"
complexipy = ">=0.2.0"
pytest = ">=8.0"
hypothesis = ">=6.90"
mutatest = ">=3.0"
pre-commit = ">=3.6.0"
maturin = ">=1.5.0"
requests = ">=2.31.0"
xmlschema = ">=3.4.0"
gradio = ">=4.0.0"
fastapi = ">=0.110.0"
uvicorn = ">=0.27.0"
opentelemetry-api = ">=1.25.0"
opentelemetry-sdk = ">=1.25.0"
opentelemetry-exporter-otlp = ">=1.25.0"
accelerate = ">=0.30.0"
peft = ">=0.11.0"
trl = ">=0.9.0"
wandb = ">=0.17.0"
scalene = ">=1.5.0"
memray = { version = ">=1.12.0", env-markers = "sys_platform != 'win32'" }
pytest-benchmark = ">=4.0.0"
pytest-cov = ">=5.0.0"
pyright = ">=1.1.0"

[tasks]
install-git-hooks = "pre-commit install"
lint = "ruff check . && vale conductor/"
format = "ruff format ."
check-complexity = "complexipy ."
check-boundaries = "tach check"
test = "pytest"
coverage = "pytest --cov=src --cov-report=html --cov-report=xml"
mutation = "mutatest --src src/nlp_policy_nz/ --tests tests/"
profile = "scalene --reduced-profile --html --outfile docs/profiling.html src/nlp_policy_nz/cli/main.py process --help"
memray = "python scripts/memray_trace.py --help"
benchmark = "pytest tests/benchmarks -q"
qlora-spec = "python -m nlp_policy_nz.training.run_qlora --help"
typecheck = "pyright src"
check = { depends_on = ["lint", "format", "check-complexity", "check-boundaries", "test"] }
