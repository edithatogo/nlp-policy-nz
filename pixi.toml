[workspace]
name = "nlp-policy-nz"
version = "0.1.0"
description = "SOTA shared core NLP pipeline for New Zealand legislation and Hansard corpora"
authors = ["Maintainer"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.14"
pip = "*"
rust = ">=1.80"
vale = ">=3.0"
nodejs = ">=20"
git = "*"

[pypi-dependencies]
polars = ">=1.0.0"
pyarrow = ">=16.0.0"
spacy = ">=3.7.0"
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }
transformers = ">=4.40.0"
torch = ">=2.2.0"
bitsandbytes = ">=0.42.0"
msgspec = ">=0.18.0"
pydantic = ">=2.11.0"
orjson = ">=3.10.0"
beautifulsoup4 = ">=4.12.0"
types-beautifulsoup4 = ">=4.12.0"
narwhals = ">=1.0.0"
lancedb = ">=0.6.0"
networkx = ">=3.0"
faiss-cpu = ">=1.8.0"
ruff = ">=0.3.0"
tach = ">=0.5.0"
import-linter = ">=2.0"
complexipy = ">=0.2.0"
pytest = ">=8.0"
hypothesis = ">=6.90"
mutatest = ">=3.0"
pre-commit = ">=3.6.0"
maturin = ">=1.5.0"
requests = ">=2.31.0"
xmlschema = ">=3.4.0"
defusedxml = ">=0.7.1"
pypdf = ">=6.0.0"
PyYAML = ">=6.0.0"
sqlite-utils = ">=3.30.0"
gradio = ">=4.0.0"
plotly = ">=5.0.0"
rdflib = ">=7.0.0"
fastapi = ">=0.110.0"
uvicorn = ">=0.27.0"
opentelemetry-api = ">=1.25.0"
opentelemetry-sdk = ">=1.25.0"
opentelemetry-exporter-otlp = ">=1.25.0"
lingua-language-detector = ">=1.4.0,<2.0.0"
accelerate = ">=0.30.0"
peft = ">=0.11.0"
trl = ">=0.9.0"
wandb = ">=0.17.0"
scalene = ">=1.5.0"
memray = { version = ">=1.12.0", env-markers = "sys_platform != 'win32'" }
pytest-benchmark = ">=4.0.0"
pytest-cov = ">=5.0.0"
basedpyright = ">=1.28.0"

[tasks]
install-git-hooks = "pre-commit install"
lint = "ruff check . && vale docs/build_backend.md docs/pydantic_vs_msgspec.md docs/axiom-foundation-relevance.md"
lint-ci = "ruff check src/nlp_policy_nz/__init__.py src/nlp_policy_nz/cli/main.py src/nlp_policy_nz/guard/__init__.py tests/test_smoke.py tests/test_guard.py tests/benchmarks/test_vector_benchmark.py scripts/benchmark_tokenizers_chunking.py"
format = "ruff format ."
format-ci = "ruff format --check src/nlp_policy_nz/__init__.py src/nlp_policy_nz/cli/main.py src/nlp_policy_nz/guard/__init__.py tests/test_smoke.py tests/test_guard.py tests/benchmarks/test_vector_benchmark.py scripts/benchmark_tokenizers_chunking.py"
check-complexity = "python -X utf8 -m complexipy.main . --max-complexity-allowed 100"
check-boundaries = "tach check"
test = "pytest"
coverage = "pytest --cov=src --cov-report=html --cov-report=xml"
coverage-ci = "pytest tests/smoke tests/test_quality_infrastructure.py tests/test_track23_evidence.py tests/test_smoke.py tests/test_akn_v3.py --cov=src --cov-report=xml --cov-report=html"
mutation = "mutatest --src src/nlp_policy_nz/ --tests tests/"
profile = "scalene --reduced-profile --html --outfile docs/profiling.html src/nlp_policy_nz/cli/main.py process --help"
memray = "python scripts/memray_trace.py --help"
benchmark = "pytest tests/benchmarks -q"
qlora-spec = "python -m nlp_policy_nz.training.run_qlora --help"
track20-runtime = "python -c \"import sys; sys.path.insert(0, 'src'); from nlp_policy_nz.training.runtime import main; raise SystemExit(main())\""
track20-smoke = "python -c \"import sys; sys.path.insert(0, 'src'); from nlp_policy_nz.training.smoke import main; raise SystemExit(main())\""
typecheck = "basedpyright src"
typecheck-ci = "basedpyright --version && python -m py_compile src/nlp_policy_nz/__init__.py src/nlp_policy_nz/cli/main.py src/nlp_policy_nz/guard/__init__.py"
check = { depends-on = ["lint", "format", "check-complexity", "check-boundaries", "test"] }
