[project]
name = "nlp-policy-nz"
version = "0.1.0"
description = "SOTA shared core NLP pipeline for New Zealand legislation and Hansard corpora"
authors = ["Maintainer"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.13"
pip = "*"
rust = ">=1.80"
cargo = "*"
vale = ">=3.0"
nodejs = ">=20"
git = "*"

[pypi-dependencies]
polars = ">=1.0.0"
pyarrow = ">=16.0.0"
spacy = ">=3.7.0"
transformers = ">=4.40.0"
torch = ">=2.2.0"
bitsandbytes = ">=0.42.0"
msgspec = ">=0.18.0"
narwhals = ">=1.0.0"
lancedb = ">=0.6.0"
networkx = ">=3.0"
faiss-cpu = ">=1.8.0"
ruff = ">=0.3.0"
tach = ">=0.5.0"
import-linter = ">=2.0"
complexipy = ">=0.2.0"
pytest = ">=8.0"
hypothesis = ">=6.90"
mutatest = ">=3.0"
pre-commit = ">=3.6.0"
maturin = ">=1.5.0"

[tasks]
install-git-hooks = "pre-commit install"
lint = "ruff check . && vale conductor/"
format = "ruff format ."
check-complexity = "complexipy ."
check-boundaries = "tach check"
test = "pytest"
check = { depends_on = ["lint", "format", "check-complexity", "check-boundaries", "test"] }
